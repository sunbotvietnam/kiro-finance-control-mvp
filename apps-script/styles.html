<style>
  :root {
    --orange: #f47b20;
    --orange-dark: #d95f05;
    --ink: #1e2428;
    --muted: #6d7780;
    --line: #e8edf1;
    --soft: #fff5ec;
    --green: #0f9f6e;
    --red: #d64a3a;
    --bg: #f7f8fa;
    --card: #ffffff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: Arial, "Helvetica Neue", sans-serif;
    color: var(--ink);
    background: var(--bg);
  }
  .app-shell {
    min-height: 100vh;
    padding: env(safe-area-inset-top) 14px 28px;
  }
  .topbar {
    position: sticky;
    top: 0;
    z-index: 5;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    padding: 14px 2px 10px;
    background: rgba(247, 248, 250, 0.94);
    backdrop-filter: blur(16px);
  }
  .eyebrow {
    margin: 0 0 4px;
    color: var(--orange-dark);
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
  }
  h1, h2, h3 { margin: 0; letter-spacing: 0; }
  h1 { font-size: 24px; }
  h2 { font-size: 20px; }
  h3 { font-size: 15px; }
  .icon-button {
    width: 44px;
    height: 44px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--card);
    font-size: 22px;
  }
  .tabbar {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 6px 0 12px;
    scrollbar-width: none;
  }
  .tabbar::-webkit-scrollbar { display: none; }
  .tab, .mode, button {
    border: 0;
    border-radius: 8px;
    min-height: 42px;
    padding: 0 14px;
    font-weight: 700;
    white-space: nowrap;
    cursor: pointer;
  }
  .tab {
    background: #e9edf2;
    color: #48515a;
  }
  .tab.is-active, .mode.is-active, .primary {
    background: var(--orange);
    color: #fff;
  }
  .secondary {
    background: #1f2933;
    color: #fff;
  }
  .view { display: none; }
  .view.is-active { display: block; }
  .section-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin: 10px 0 14px;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    min-height: 28px;
    padding: 0 10px;
    border-radius: 8px;
    background: var(--soft);
    color: var(--orange-dark);
    font-size: 12px;
    font-weight: 700;
  }
  .metric-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
    margin-bottom: 12px;
  }
  .metric {
    min-height: 100px;
    padding: 14px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--card);
  }
  .metric span {
    display: block;
    color: var(--muted);
    font-size: 13px;
    line-height: 1.25;
  }
  .metric strong {
    display: block;
    margin-top: 10px;
    font-size: 24px;
    line-height: 1.1;
  }
  .metric-grid.small .metric {
    min-height: 82px;
  }
  .panel {
    margin-bottom: 12px;
    padding: 14px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--card);
  }
  .panel h3 { margin-bottom: 12px; }
  .two-col {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
  }
  .list {
    display: grid;
    gap: 8px;
  }
  .list-row, .record {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    padding: 10px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #fff;
  }
  .list-row span, .record small {
    color: var(--muted);
    font-size: 12px;
  }
  .mode-switch, .filters {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 12px;
  }
  .mode {
    background: #ffe5d0;
    color: var(--orange-dark);
  }
  .form-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
  }
  label {
    display: grid;
    gap: 6px;
    color: #3b444c;
    font-size: 13px;
    font-weight: 700;
  }
  input, select, textarea {
    width: 100%;
    min-height: 46px;
    border: 1px solid #d8e0e7;
    border-radius: 8px;
    padding: 10px 12px;
    background: #fff;
    color: var(--ink);
    font: inherit;
  }
  textarea { resize: vertical; }
  .wide { grid-column: 1 / -1; }
  .records {
    display: grid;
    gap: 10px;
  }
  .record {
    display: grid;
    grid-template-columns: 1fr;
  }
  .record-head {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    align-items: start;
  }
  .amount-in { color: var(--green); }
  .amount-out { color: var(--red); }
  .amount-transfer { color: var(--orange-dark); }
  .record-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .record-actions button {
    min-height: 36px;
    padding: 0 10px;
    background: #edf1f5;
    color: var(--ink);
  }
  .hook-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
  }
  .hook-grid span {
    padding: 10px;
    border-radius: 8px;
    background: var(--soft);
    color: var(--orange-dark);
    font-size: 12px;
    font-weight: 700;
  }
  .toast {
    position: fixed;
    left: 14px;
    right: 14px;
    bottom: 16px;
    z-index: 20;
    display: none;
    padding: 12px 14px;
    border-radius: 8px;
    background: #1f2933;
    color: #fff;
    font-size: 14px;
  }
  .toast.show { display: block; }
  @media (min-width: 760px) {
    .app-shell {
      max-width: 1180px;
      margin: 0 auto;
      padding-left: 22px;
      padding-right: 22px;
    }
    h1 { font-size: 30px; }
    .metric-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .two-col { grid-template-columns: 1fr 1fr; }
    .form-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .record { grid-template-columns: 1fr auto; align-items: center; }
  }
</style>
